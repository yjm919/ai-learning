name: Daily Knowledge Collect

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate articles
        if: success() || failure()
        run: |
          python hooks/validate_json.py knowledge/articles/
          python hooks/check_quality.py knowledge/articles/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_COUNT=$(git diff --name-only --diff-filter=A -- knowledge/ | sed -n '/\.json$/p' | wc -l)

          if git diff --quiet -- knowledge/ && [ -z "$(git ls-files --others --exclude-standard -- knowledge/)" ]; then
            echo "No new data in knowledge/, skipping commit"
            exit 0
          fi

          git add knowledge/

          TODAY=$(date -u +%Y-%m-%d)
          if [ "$NEW_COUNT" -gt 0 ]; then
            MSG="chore: collect ${NEW_COUNT} new articles on ${TODAY}"
          else
            MSG="chore: update knowledge base on ${TODAY}"
          fi

          git commit -m "$MSG"
          git push

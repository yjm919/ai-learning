# RSS 数据源配置 — AI Knowledge Base Pipeline
# 每个源包含: name(名称) url(地址) category(分类) enabled(是否启用)

sources:
  # ── 综合技术 ──────────────────────────────────────────
  - name: "Hacker News Best (AI)"
    url: "https://hnrss.org/best?q=ai+OR+llm+OR+agent+OR+ml+OR+deepseek+OR+openai"
    category: "综合技术"
    enabled: false

  - name: "Lobsters AI/ML"
    url: "https://lobste.rs/t/ai.rss"
    category: "综合技术"
    enabled: true

  # ── AI 研究 ────────────────────────────────────────────
  - name: "arXiv cs.AI"
    url: "http://export.arxiv.org/rss/cs.AI"
    category: "AI 研究"
    enabled: false

  # ── 公司博客 ───────────────────────────────────────────
  - name: "OpenAI Blog"
    url: "https://openai.com/blog/rss.xml"
    category: "公司博客"
    enabled: true

  - name: "Anthropic Research"
    url: "https://www.anthropic.com/research/feed"
    category: "公司博客"
    enabled: true

  - name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    category: "公司博客"
    enabled: true

  # ── 中文社区（默认禁用，需确认 RSS 可用性后再开启）───────
  - name: "机器之心"
    url: "https://www.jiqizhixin.com/rss"
    category: "中文社区"
    enabled: false

  - name: "量子位"
    url: "https://www.qbitai.com/feed"
    category: "中文社区"
    enabled: false
